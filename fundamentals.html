    function fizzbuzz(limit) {
        let result = []
        for (let i = 1; i <= limit; i++) {
            if (i % 3 === 0 && i % 5 === 0) {
                result.push('fizzbuzz')
            } else if (i % 3 === 0 ) {
                result.push('fizz')
            } else if (i % 5 === 0 ) {
                result.push('buzz')
            } else {
                result.push(i)
            }
        }
        return result
    }

    function finabocci(limit) {
        let f = []
        for (let i = 0; i < limit; i++) {
            if (i === 0) { f[i] = 1}
            else if (i === 1 ) { f[i] = 1}
                else { f[i] = f[i - 2] + f[i - 1]}
        }

    function debounce (func, delay) {
        let timeout;
        return function (...arg) {
            clearTimeout(timeout)
            setTimeout(() => { func(arg) }, delay)
        }       
    }
    
    //-------------------------------------------------

    function throttle (func, delay) {
        let lastTime = 0;
        return function (...arg) {
            let now = new Date().getTime()
            if (now - lastTime >= delay) {
                func(arg)
                now = lastTime
            }
        }
    }

    function memoize (func) {
        let cashe = {};
        return function (...arg) {
            let key = JSON.stringify(arg)
            if (!cashe[key]) {
                cashe[key]  = func(arg)
            }
            return cashe[key]
        }
    }

    function reconstructTrip (tickets) {
        let map = {}
        for (let i = 0; i < tickets.length; i++) {
            let ticket = tickets[i]
            map[ticket.from] = ticket.to
        }

    let start = Object.keys(map).find(from => 
        !Object.entries(map).includes(from)
    )
        let route = []
        for (let i = 0; i < tickets.length; i++) {
            route.push({from: start, to: map[start]})
            start = map[start]
        }
        return route
    }

    function replaceSubstring(str, search, replace) {
        let result = ''
        for (let i = 0; i < str.length; i++) {
            if (str.substring(i, i + search.length) === search) {
                result += replace
                i += search.length - 1
            } else {
                result += str[i]
            }
        }
        return result
    }
